<header class="site-header">

<div class="banner">
  <div class="banner-badge" id="book-emoji"></div>
  <div>
    <div class="banner-title" id="book-title"></div>
    <div class="banner-author" id="book-author"></div>
  </div>
  <div class="banner-meta">
    <div class="meta-num" id="chapter-count"></div>
    <div class="meta-label">Chapters</div>
  </div>
</div>

<div class="track-list" id="chapter-list"></div>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="footer-name">Logan English Academy</span>
      <p>Book-based English instruction for young learners.</p>
      <p><a href="mailto:logan@loganenglishacademy.com">logan@loganenglishacademy.com</a></p>
    </div>
    <nav class="footer-nav" aria-label="Footer">
      <a href="/">Home</a>
      <a href="/homework.html">Homework</a>
      <a href="/readingaudio/">Reading Library</a>
    </nav>
  </div>

</footer>
<script>var _fy=document.getElementById('footer-year');if(_fy)_fy.textContent=new Date().getFullYear();</script>

<script>
  const C = CONFIG;

  document.title = C.bookTitle + ' Audio — ' + C.academyName;
  document.getElementById('book-emoji').textContent  = C.bookEmoji;
  document.getElementById('book-title').textContent  = C.bookTitle;
  document.getElementById('book-author').textContent = C.bookAuthor;
  document.getElementById('chapter-count').textContent = C.chapters.length;

  const dlIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13M7 11l5 5 5-5M3 20h18"/></svg>`;

  const list = document.getElementById('chapter-list');
    C.chapters.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'track-item';
    const filename = ch.url.split('/').pop();
    card.innerHTML = `
      <div class="track-top">
        <div class="track-num">${i + 1}</div>
        <div class="track-title">${ch.title}</div>
        <a class="download-btn" href="${ch.url}" download="${decodeURIComponent(filename)}" aria-label="Download ${ch.title}">
          ${dlIcon}<span>Download</span>
        </a>
      </div>
      <div class="track-player">
        <audio controls preload="none" src="${ch.url}" aria-label="${ch.title}"></audio>
      </div>`;
    list.appendChild(card);
  });
</script>

</body>
</html>
