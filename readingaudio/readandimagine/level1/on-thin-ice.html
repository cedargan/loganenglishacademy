<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>On Thin Ice — Logan English Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Lora:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#faf8f5;--card:#ffffff;--border:#e8e2d9;--text:#2d2a26;--muted:#8a8278;--accent:#3d6b4f;--accent-light:#eaf2ed;--r:12px}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .hdr{background:var(--card);border-bottom:2px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:14px}
    .hl{display:flex;align-items:center;gap:10px;text-decoration:none}
    .hl img{height:40px;width:auto}
    .hn{font-family:'Lora',serif;font-size:1.1rem;font-weight:700;color:var(--accent);line-height:1.2}
    .hn span{display:none}
    .bk{margin-left:auto;font-size:0.9rem;font-weight:700;color:var(--accent);text-decoration:none;padding:6px 14px;border-radius:8px;background:var(--accent-light)}
    .bk:hover{background:#d0e8d8}
    .ban{background:var(--card);border-bottom:2px solid var(--border);padding:1.5rem;display:flex;align-items:center;gap:1.25rem}
    .bdg{width:52px;height:52px;border-radius:10px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:26px}
    .bt{font-family:'Lora',serif;font-size:1.35rem;font-weight:700;color:var(--text)}
    .bs{font-size:14px;color:var(--muted);margin-top:2px}
    .bm{margin-left:auto;text-align:right;flex-shrink:0}
    .mn{font-size:1.6rem;font-weight:800;color:var(--accent);line-height:1}
    .ml{font-size:12px;color:var(--muted);font-weight:600}
    .lst{max-width:720px;margin:1.5rem auto;padding:0 1rem 3rem;display:flex;flex-direction:column;gap:10px}
    .ch{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .ct{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem}
    .cn{width:36px;height:36px;border-radius:8px;background:var(--accent-light);color:var(--accent);font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .cti{font-size:15px;font-weight:700;flex:1;color:var(--text)}
    .cdl{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--accent);text-decoration:none;padding:6px 14px;border-radius:8px;border:2px solid var(--accent);transition:all .15s;white-space:nowrap;flex-shrink:0}
    .cdl:hover{background:var(--accent);color:#fff}
    .cdl svg{width:14px;height:14px}
    .cp{padding:0 1.25rem 1rem}
    .cp audio{width:100%;height:40px;border-radius:8px;display:block}
    footer{text-align:center;padding:28px 20px;font-size:0.85rem;color:var(--muted);border-top:2px solid var(--border)}
    footer strong{color:var(--accent)}
    @media(max-width:560px){.cdl span{display:none}.cdl{padding:6px 10px}}
  </style>
</head>
<body>
<header class="hdr">
  <a class="hl" href="../../index.html"><img src="../../logo.png" alt="Logan English Academy"/><div class="hn">Logan English Academy<span>Reading Library</span></div></a>
  <a class="bk" href="../../index.html">← Reading Library</a>
</header>
<div class="ban">
  <div class="bdg">📖</div>
  <div><div class="bt">On Thin Ice</div><div class="bs">Read and Imagine · Level 1</div></div>
  <div class="bm"><div class="mn">10</div><div class="ml">Tracks</div></div>
</div>
<div class="lst" id="L"></div>
<footer><strong>Logan English Academy</strong> — Audio files are for enrolled students only.</footer>
<script>
const T=[
  {title:"Full Recording",url:"https://audio.loganenglishacademy.com/readandimagine/level1/On%20Thin%20Ice/readandimagine1_on_thin_ice_american_10_all.mp3"},
  {title:"Pages 2–5",url:"https://audio.loganenglishacademy.com/readandimagine/level1/On%20Thin%20Ice/readandimagine1_on_thin_ice_american_01_page_2_5.mp3"},
  {title:"Pages 6–7",url:"https://audio.loganenglishacademy.com/readandimagine/level1/On%20Thin%20Ice/readandimagine1_on_thin_ice_american_02_page_6_7.mp3"},
  {title:"Pages 8–9",url:"https://audio.loganenglishacademy.com/readandimagine/level1/On%20Thin%20Ice/readandimagine1_on_thin_ice_american_03_page_8_9.mp3"},
  {title:"Pages 10–11",url:"https://audio.loganenglishacademy.com/readandimagine/level1/On%20Thin%20Ice/readandimagine1_on_thin_ice_american_04_page_10_11.mp3"},
  {title:"Pages 12–13",url:"https://audio.loganenglishacademy.com/readandimagine/level1/On%20Thin%20Ice/readandimagine1_on_thin_ice_american_05_page_12_13.mp3"},
  {title:"Pages 14–15",url:"https://audio.loganenglishacademy.com/readandimagine/level1/On%20Thin%20Ice/readandimagine1_on_thin_ice_american_06_page%2014_15.mp3"},
  {title:"Pages 16–17",url:"https://audio.loganenglishacademy.com/readandimagine/level1/On%20Thin%20Ice/readandimagine1_on_thin_ice_american_07_page_16_17.mp3"},
  {title:"Pages 18–19",url:"https://audio.loganenglishacademy.com/readandimagine/level1/On%20Thin%20Ice/readandimagine1_on_thin_ice_american_08_page_18_19.mp3"},
  {title:"Picture Dictionary",url:"https://audio.loganenglishacademy.com/readandimagine/level1/On%20Thin%20Ice/readandimagine1_on_thin_ice_american_09_picture_dictionary.mp3"}
];
const di='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13M7 11l5 5 5-5M3 20h18"/></svg>';
const L=document.getElementById('L');
T.forEach((t,i)=>{const c=document.createElement('div');c.className='ch';const fn=t.url.split('/').pop();c.innerHTML='<div class="ct"><div class="cn">'+(i+1)+'</div><div class="cti">'+t.title+'</div><a class="cdl" href="'+t.url+'" download="'+decodeURIComponent(fn)+'">'+di+'<span>Download</span></a></div><div class="cp"><audio controls preload="none" src="'+t.url+'"></audio></div>';L.appendChild(c);});
</script>
</body>
</html>
