<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>The Skateboarder/ — Logan English Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Lora:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#faf8f5;--card:#ffffff;--border:#e8e2d9;
      --text:#2d2a26;--muted:#8a8278;
      --accent:#3d6b4f;--accent-light:#eaf2ed;--r:12px
    }
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* ── Header (Variant A) ── */
    .hdr{background:var(--card);border-bottom:2px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:14px}
    .hl,.hdr-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .hl img,.hdr-logo img,.header-logo img{height:40px;width:auto}
    .hn,.hdr-name{font-family:'Lora',serif;font-size:1.1rem;font-weight:700;color:var(--accent);line-height:1.2}
    .hn span,.hdr-name span{display:none}
    .bk,.hdr-home{margin-left:auto;font-size:0.9rem;font-weight:700;color:var(--accent);text-decoration:none;padding:6px 14px;border-radius:8px;background:var(--accent-light)}
    .bk:hover,.hdr-home:hover{background:#d0e8d8}

    /* ── Header (Variant B) ── */
    .header{background:var(--card);border-bottom:2px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:14px}
    .header-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .header-name{font-family:'Lora',serif;font-size:1.1rem;font-weight:700;color:var(--accent);line-height:1.2}
    .header-name span{display:none}
    .back-link{margin-left:auto;font-size:0.9rem;font-weight:700;color:var(--accent);text-decoration:none;padding:6px 14px;border-radius:8px;background:var(--accent-light);display:flex;align-items:center;gap:5px;transition:background .15s}
    .back-link:hover{background:#d0e8d8}

    /* ── Book banner (Variant A) ── */
    .ban{background:var(--card);border-bottom:2px solid var(--border);padding:1.5rem;display:flex;align-items:center;gap:1.25rem}
    .bdg{width:52px;height:52px;border-radius:10px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:26px}
    .bt{font-family:'Lora',serif;font-size:1.35rem;font-weight:700;color:var(--text)}
    .bs{font-size:14px;color:var(--muted);margin-top:2px}
    .bm{margin-left:auto;text-align:right;flex-shrink:0}
    .mn{font-size:1.6rem;font-weight:800;color:var(--accent);line-height:1}
    .ml{font-size:12px;color:var(--muted);font-weight:600}

    /* ── Book banner (Variant B) ── */
    .banner{background:var(--card);border-bottom:2px solid var(--border);padding:1.5rem;display:flex;align-items:center;gap:1.25rem}
    .banner-badge{width:52px;height:52px;border-radius:10px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:26px}
    .banner-title{font-family:'Lora',serif;font-size:1.35rem;font-weight:700;color:var(--text);line-height:1.2}
    .banner-author{font-size:14px;color:var(--muted);margin-top:2px}
    .banner-meta{margin-left:auto;text-align:right;flex-shrink:0}
    .meta-num{font-size:1.6rem;font-weight:800;color:var(--accent);line-height:1}
    .meta-label{font-size:12px;color:var(--muted);font-weight:600}

    /* ── Track list (Variant A) ── */
    .lst{max-width:720px;margin:1.5rem auto;padding:0 1rem 3rem;display:flex;flex-direction:column;gap:10px}
    .ch{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .ct{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem}
    .cn{width:36px;height:36px;border-radius:8px;background:var(--accent-light);color:var(--accent);font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .cti{font-size:15px;font-weight:700;flex:1;color:var(--text)}
    .cdl{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--accent);text-decoration:none;padding:6px 14px;border-radius:8px;border:2px solid var(--accent);transition:all .15s;white-space:nowrap;flex-shrink:0}
    .cdl:hover{background:var(--accent);color:#fff}
    .cdl svg{width:14px;height:14px}
    .cp{padding:0 1.25rem 1rem}
    .cp audio{width:100%;height:40px;border-radius:8px;display:block}

    /* ── Track list (Variant B) ── */
    .track-list{max-width:720px;margin:1.5rem auto;padding:0 1rem 3rem;display:flex;flex-direction:column;gap:10px}
    .track-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .track-top{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem}
    .track-num{width:36px;height:36px;border-radius:8px;background:var(--accent-light);color:var(--accent);font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .track-title{font-size:15px;font-weight:700;flex:1;color:var(--text)}
    .download-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--accent);text-decoration:none;padding:6px 14px;border-radius:8px;border:2px solid var(--accent);transition:all .15s;white-space:nowrap;flex-shrink:0}
    .download-btn:hover{background:var(--accent);color:#fff}
    .download-btn svg{width:14px;height:14px}
    .track-player{padding:0 1.25rem 1rem}
    .track-player audio{width:100%;height:40px;border-radius:8px;display:block}

    /* ── Footer ── */
    footer{text-align:center;padding:28px 20px;font-size:0.85rem;color:var(--muted);border-top:2px solid var(--border)}
    footer a{color:var(--accent);text-decoration:none}
    footer strong{color:var(--accent)}

    /* ── Index page: hero ── */
    .hero{background:var(--card);border-bottom:2px solid var(--border);padding:2rem 1.5rem 2rem}
    .hero h1{font-family:'Lora',serif;font-size:clamp(1.6rem,4vw,2.2rem);font-weight:700;color:var(--text);line-height:1.2}
    .hero p{font-size:15px;color:var(--muted);margin-top:.375rem}
    .hero-stats{display:flex;gap:1.5rem;margin-top:1.25rem;flex-wrap:wrap}
    .hero-stat{background:var(--accent-light);border-radius:10px;padding:.625rem 1rem;min-width:80px}
    .hero-stat-n{font-size:1.5rem;font-weight:800;line-height:1;color:var(--accent)}
    .hero-stat-l{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}

    /* ── Index page: search ── */
    .search-wrap{max-width:860px;margin:1.5rem auto 0;padding:0 1rem}
    .search-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:.625rem 1rem;transition:border-color .15s}
    .search-box:focus-within{border-color:var(--accent)}
    .search-box svg{color:var(--muted);flex-shrink:0;width:18px;height:18px}
    .search-box input{flex:1;border:none;outline:none;font-family:'Nunito',sans-serif;font-size:15px;color:var(--text);background:transparent}
    .search-box input::placeholder{color:#aaa}

    /* ── Index page: grid ── */
    .main{max-width:860px;margin:1.25rem auto;padding:0 1rem 4rem}
    .series-block{margin-bottom:2rem}
    .series-hdr{display:flex;align-items:center;gap:.875rem;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:2px solid var(--border)}
    .series-emoji{font-size:1.75rem;flex-shrink:0}
    .series-name{font-size:1.1rem;font-weight:800;color:var(--text)}
    .series-desc{font-size:13px;color:var(--muted);margin-top:1px}
    .series-count{margin-left:auto;background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0}
    .level-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:.875rem 0 .5rem;padding-left:2px}
    .book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
    .book-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:.5rem;transition:all .15s;cursor:pointer}
    .book-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(61,107,79,.15);transform:translateY(-1px)}
    .book-card-top{flex:1}
    .book-title{font-size:14px;font-weight:700;line-height:1.35;color:var(--text)}
    .book-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.25rem}
    .track-count{font-size:12px;color:var(--muted);font-weight:600}
    .arrow{font-size:14px;color:var(--accent);font-weight:800;transition:transform .15s}
    .book-card:hover .arrow{transform:translateX(3px)}
    .no-results{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:15px;display:none}

    @media(max-width:560px){
      .cdl span,.download-btn span{display:none}
      .cdl,.download-btn{padding:6px 10px}
      .hero{padding:1.5rem 1.25rem 1.5rem}
      .book-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr))}
    }
  </style>
</head>
<body>
<header class="hdr">
  <a class="hl" href="../../index.html"><img src="../../logo.png" alt="Logan English Academy"/><div class="hn">Logan English Academy<span>Reading Library</span></div></a>
  <a class="bk" href="../../index.html">← Reading Library</a>
</header>
<div class="ban">
  <div class="bdg">📖</div>
  <div><div class="bt">The Skateboarder/</div><div class="bs">dominoes/ · quickstarter/</div></div>
  <div class="bm"><div class="mn">6</div><div class="ml">Tracks</div></div>
</div>
<div class="lst" id="L"></div>
<footer><strong>Logan English Academy</strong> — Audio files are for enrolled students only.</footer>
<script>
const T=[
  {title:"Chapter 1",url:"https://audio.loganenglishacademy.com/dominoes/quickstarter/The%20Skateboarder/dominoesqs_the_skateboarder_chapter01.mp3"},
  {title:"Chapter 2",url:"https://audio.loganenglishacademy.com/dominoes/quickstarter/The%20Skateboarder/dominoesqs_the_skateboarder_chapter02.mp3"},
  {title:"Chapter 3",url:"https://audio.loganenglishacademy.com/dominoes/quickstarter/The%20Skateboarder/dominoesqs_the_skateboarder_chapter03.mp3"},
  {title:"Chapter 4",url:"https://audio.loganenglishacademy.com/dominoes/quickstarter/The%20Skateboarder/dominoesqs_the_skateboarder_chapter04.mp3"},
  {title:"Chapter 5",url:"https://audio.loganenglishacademy.com/dominoes/quickstarter/The%20Skateboarder/dominoesqs_the_skateboarder_chapter05.mp3"},
  {title:"Chapter 6",url:"https://audio.loganenglishacademy.com/dominoes/quickstarter/The%20Skateboarder/dominoesqs_the_skateboarder_chapter06.mp3"}
];
const di='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13M7 11l5 5 5-5M3 20h18"/></svg>';
const L=document.getElementById('L');
T.forEach((t,i)=>{const c=document.createElement('div');c.className='ch';const fn=t.url.split('/').pop();c.innerHTML='<div class="ct"><div class="cn">'+(i+1)+'</div><div class="cti">'+t.title+'</div><a class="cdl" href="'+t.url+'" download="'+decodeURIComponent(fn)+'">'+di+'<span>Download</span></a></div><div class="cp"><audio controls preload="none" src="'+t.url+'"></audio></div>';L.appendChild(c);});
</script>
</body>
</html>
