<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Trees/ — Logan English Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#29ABE2;--bld:#1a8fbd;--bdim:#e8f7fd;--y:#FFE500;--t:#1a1a1a;--m:#666;--bg:#f5f7fa;--w:#fff;--br:#e0e4ea;--r:12px}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
    .hdr{background:var(--blue);padding:0 1.5rem;height:64px;display:flex;align-items:center;justify-content:space-between}
    .hl{display:flex;align-items:center;gap:10px;text-decoration:none}
    .hl img{height:38px;width:auto}.hn{font-size:16px;font-weight:800;color:#fff;line-height:1.2}
    .hn span{display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.7)}
    .bk{font-size:13px;font-weight:600;color:rgba(255,255,255,.85);text-decoration:none}.bk:hover{color:#fff}
    .ban{background:var(--w);border-bottom:1px solid var(--br);padding:1.5rem;display:flex;align-items:center;gap:1.25rem}
    .bdg{width:52px;height:52px;border-radius:10px;background:var(--y);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:26px}
    .bt{font-size:1.35rem;font-weight:800}.bs{font-size:14px;color:var(--m);margin-top:2px}
    .bm{margin-left:auto;text-align:right;flex-shrink:0}
    .mn{font-size:1.6rem;font-weight:800;color:var(--blue);line-height:1}.ml{font-size:12px;color:var(--m);font-weight:600}
    .lst{max-width:720px;margin:1.5rem auto;padding:0 1rem 3rem;display:flex;flex-direction:column;gap:10px}
    .ch{background:var(--w);border:1px solid var(--br);border-radius:var(--r);overflow:hidden}
    .ct{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem}
    .cn{width:36px;height:36px;border-radius:8px;background:var(--bdim);color:var(--bld);font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .cti{font-size:15px;font-weight:700;flex:1}
    .cdl{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--bld);text-decoration:none;padding:6px 14px;border-radius:8px;border:2px solid var(--blue);transition:all .15s;white-space:nowrap;flex-shrink:0}
    .cdl:hover{background:var(--blue);color:#fff}.cdl svg{width:14px;height:14px}
    .cp{padding:0 1.25rem 1rem}.cp audio{width:100%;height:40px;border-radius:8px;display:block}
    footer{text-align:center;padding:1.5rem;font-size:13px;color:var(--m);border-top:1px solid var(--br)}
    footer strong{color:var(--bld)}
    @media(max-width:560px){.cdl span{display:none}.cdl{padding:6px 10px}}
  </style>
</head>
<body>
<header class="hdr">
  <a class="hl" href="../../index.html"><img src="../../logo.png" alt="Logan English Academy"/><div class="hn">Logan English Academy<span>Reading Library</span></div></a>
  <a class="bk" href="../../index.html">← Reading Library</a>
</header>
<div class="ban">
  <div class="bdg">📖</div>
  <div><div class="bt">Trees/</div><div class="bs">readanddiscover/ · Level 1/</div></div>
  <div class="bm"><div class="mn">10</div><div class="ml">Tracks</div></div>
</div>
<div class="lst" id="L"></div>
<footer><strong>Logan English Academy</strong> — Audio files are for enrolled students only.</footer>
<script>
const T=[
  {title:"Trees all american",url:"https://audio.loganenglishacademy.com/readanddiscover/Level%201/trees/readanddiscover1_trees_all_american.mp3"},
  {title:"01",url:"https://audio.loganenglishacademy.com/readanddiscover/Level%201/trees/readanddiscover1_trees_american_01_chapter_01.mp3"},
  {title:"02",url:"https://audio.loganenglishacademy.com/readanddiscover/Level%201/trees/readanddiscover1_trees_american_02_chapter_02.mp3"},
  {title:"03",url:"https://audio.loganenglishacademy.com/readanddiscover/Level%201/trees/readanddiscover1_trees_american_03_chapter_03.mp3"},
  {title:"04",url:"https://audio.loganenglishacademy.com/readanddiscover/Level%201/trees/readanddiscover1_trees_american_04_chapter_04.mp3"},
  {title:"05",url:"https://audio.loganenglishacademy.com/readanddiscover/Level%201/trees/readanddiscover1_trees_american_05_chapter_05.mp3"},
  {title:"06",url:"https://audio.loganenglishacademy.com/readanddiscover/Level%201/trees/readanddiscover1_trees_american_06_chapter_06.mp3"},
  {title:"07",url:"https://audio.loganenglishacademy.com/readanddiscover/Level%201/trees/readanddiscover1_trees_american_07_chapter_07.mp3"},
  {title:"08",url:"https://audio.loganenglishacademy.com/readanddiscover/Level%201/trees/readanddiscover1_trees_american_08_chapter_08.mp3"},
  {title:"Picture Dictionary",url:"https://audio.loganenglishacademy.com/readanddiscover/Level%201/trees/readanddiscover1_trees_american_09_picture_dictionary.mp3"}
];
const di='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13M7 11l5 5 5-5M3 20h18"/></svg>';
const L=document.getElementById('L');
T.forEach((t,i)=>{const c=document.createElement('div');c.className='ch';const fn=t.url.split('/').pop();c.innerHTML='<div class="ct"><div class="cn">'+(i+1)+'</div><div class="cti">'+t.title+'</div><a class="cdl" href="'+t.url+'" download="'+decodeURIComponent(fn)+'">'+di+'<span>Download</span></a></div><div class="cp"><audio controls preload="none" src="'+t.url+'"></audio></div>';L.appendChild(c);});
</script>
</body>
</html>
